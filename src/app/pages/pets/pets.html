<!--BANNER-->
<app-banner
  [imageUrl]="'assets/banners/banner-inicio.png'"
  [title]="'Mascotas disponibles'">
</app-banner>

<section class="pets-container">

  <!-- Controles de filtrado y emergencia -->
  <div class="pets-controls">
    <!-- Botón para activar/desactivar el filtro de emergencia, se aplica la clase active si isEmergencyActive es true -->
    <!--De normal tiene su classe, si no tiene la subclase activo-->
    <button class="emergency-btn" [class.active]="isEmergencyActive" (click)="emergencyAction()">
      Emergencia
    </button>

    <label for="speciesFilter">Filtrar por especie:</label>
     <!-- Control two way data binding, por un lado lo que el usuario selleccione se gaurda en selectedSpecies
      y si selected species cambia en el código también cambia 
      cuando el usuario cambia se llama al método filterPets() -->
    <select
      id="speciesFilter"
      [(ngModel)]="selectedSpecies"
      (change)="filterPets()"
    >
    <!-- Opciones de filtro -->
      <option value="">Todas</option>
      <option value="Perro">Perro</option>
      <option value="Gato">Gato</option>
    </select>
  </div>

  <div class="pets-grid">
    <article class="pet-card" *ngFor="let pet of pets"   [routerLink]="['/pet', pet.id]">
      <img [src]="pet.imageUrl" [alt]="pet.name" />

      <div class="pet-content">
        <h2>{{ pet.name }}</h2>
        <p>{{ pet.species }} - {{ pet.breed }}</p>
        <p>{{ pet.age }} anos - {{ pet.size }}</p>
        <p>{{ pet.location }}</p>
        <p>{{ pet.description }}</p>
        <span class="status" [class.adopted]="pet.adopted">
          {{ pet.adopted ? 'Adoptada' : 'Disponible' }}
        </span>
      </div>
    </article>
  </div>
</section>
