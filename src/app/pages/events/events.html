<!--BANNER-->
<app-banner
  [imageUrl]="'assets/banners/banner-inicio.png'"
  [title]="''">
</app-banner>
<!-- EVENTOS ACTIVOS -->
<section class="active-events">
  <h2>Eventos Activos</h2>

  <div class="events-grid">
    <div class="event-wrapper" *ngFor="let event of activeEvents">
      <!-- Imagen fuera de la tarjeta -->
      <img class="event-image-bordered" [src]="event.imageUrl">
      <!-- Nombre fuera de la tarjeta -->
      <h3 class="event-name">{{ event.name }}</h3>
      <!-- Tarjeta solo con la información -->
      <div class="event-card">
        <div class="event-info">
          <p>{{ event.description }}</p>
        </div>
      </div>
    </div>
  </div>
</section>

<!-- EVENTOS PASADOS -->
<section class="past-events">
  <h2>Eventos Pasados</h2>

 <div class="event-row" *ngFor="let event of pastEvents">  
     <img [src]="event.imageUrl" [alt]="event.name">
    <article class="event-card">     
      <h3>{{ event.name }}</h3>
      <p> {{ event.description }}</p>
    </article>
  </div>
</section>
